services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bank_campaigns
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user -d bank_campaigns"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg2://bank_user:bank_password@postgres:5432/bank_campaigns
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-dev-field-encryption-key-change-me-32b}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-dev-backup-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ../frontend
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
